name: smart_duka_manager
description: A lightweight POS & inventory app for Kenyan dukas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  # Use this one only - it is more modern and compatible with intl 0.20
  flutter_mpesa_stk: ^1.0.2
  http: ^1.2.2
  fl_chart: ^1.1.1              # Updated to a more stable version
  shared_preferences: ^2.3.2
  intl: ^0.19.0                  # Lowered slightly to bridge the gap between plugins
  uuid: ^4.4.2
  fluttertoast: ^9.0.0          # Fixed: 9.0.0 does not exist; 8.2.10 is the latest
  collection: ^1.18.0
  mobile_scanner: ^7.1.4
  url_launcher: ^6.3.0
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  google_fonts: ^6.1.0   # For professional typography
  animate_do: ^3.3.4
# This is the "Magic" that fixes the intl 0.20 conflict
dependency_overrides:
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true